<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- warm parchment tile -->
  <rect width="32" height="32" rx="7" fill="#f4eee2"/>
  <!-- quill feather body (ink — mirrors the mark silhouette from the logo) -->
  <path d="M16 3 C22.5 3 27 8 27 15 C27 21.5 23 26 16 29 C9 26 5 21.5 5 15 C5 8 9.5 3 16 3Z" fill="#2a251d"/>
  <!-- centre spine (subtle lighter crease) -->
  <path d="M16 4 L16 29" stroke="#3d3628" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- door arch interior (parchment cutout at base of feather) -->
  <path d="M13.5 29 L13.5 22 Q13.5 19 16 19 Q18.5 19 18.5 22 L18.5 29Z" fill="#ece4d4"/>
  <!-- terracotta steps (two bars inside the door opening) -->
  <rect x="11.5" y="23.5" width="9" height="1.8" rx="0.4" fill="#b25a38"/>
  <rect x="13" y="26" width="6" height="1.8" rx="0.4" fill="#b25a38"/>
</svg>
